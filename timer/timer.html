<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./timer.css"></link>
  <title>Love's Timer</title>
</head>
<body>
<div class="container">
  <h2>距我们在一起已经过啦</h2>
  <div class="time-display">
      <span id="days">00</span> 天
      <span id="hours">00</span> 时
      <span id="minutes">00</span> 分
      <span id="seconds">00</span> 秒
  </div>

  <div class="input-group">
      <input type="datetime-local" id="memorialTime" value="2026-01-01T17:25">
      <br>
      <input type="text" id="memorialTitle" value="在一起" placeholder="输入纪念日名称">
  </div>

  <div>
      <button onclick="setMemorialDay()">设定纪念日</button>
      <button onclick="resetTimer()">重置</button>
  </div>
</div>
  
  <script src="./timer.js"></script>
</body>
</html>
